name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Generate android/ios platform folders (repo only carries lib/ + native/)
      - name: Scaffold platforms
        run: flutter create --org com.flovex --project-name knot --platforms android,ios .

      - name: Wire Android widget
        run: bash scripts/setup_android_widget.sh

      - name: Pin minSdkVersion to 21 (required by home_widget/image_picker)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' android/app/build.gradle.kts
            grep -i minsdk android/app/build.gradle.kts || true
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
            grep -i sdkversion android/app/build.gradle || true
          else
            echo "No build.gradle(.kts) found — skipping, default minSdk should be fine"
          fi

      - name: Build APK
        run: |
          set -o pipefail
          flutter pub get
          flutter build apk --release --verbose 2>&1 | tee build_log.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - uses: actions/upload-artifact@v4
        with:
          name: knot-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
