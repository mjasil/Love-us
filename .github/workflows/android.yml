name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Generate android/ios platform folders (repo only carries lib/ + native/)
      - name: Scaffold platforms
        run: flutter create --org com.flovex --project-name knot --platforms android,ios .

      - name: Wire Android widget
        run: bash scripts/setup_android_widget.sh

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: knot-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
